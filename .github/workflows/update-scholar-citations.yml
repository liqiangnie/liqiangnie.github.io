name: Update Scholar Citations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh citation snapshot
        run: python3 scripts/update_scholar_citations.py

      - name: Commit updated citation data
        run: |
          if git diff --quiet -- Activities.html res/scholar-citations.json; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Activities.html res/scholar-citations.json
          git commit -m "chore: update scholar citations"
          git push
